<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-lg shadow-lg">
        <h1 class="text-2xl font-bold mb-4">Test du Chatbot IA</h1>
        
        <div class="mb-4">
            <button id="testToggle" class="bg-blue-500 text-white px-4 py-2 rounded">
                Test Toggle Button
            </button>
        </div>

        <div class="mb-4">
            <input type="text" id="testQuestion" class="border p-2 w-full rounded" placeholder="Votre question...">
            <button id="testSubmit" class="bg-green-500 text-white px-4 py-2 rounded mt-2">
                Test API Call
            </button>
        </div>

        <div id="results" class="bg-gray-50 p-4 rounded mt-4">
            <h3 class="font-bold mb-2">Résultats:</h3>
            <div id="output" class="text-sm"></div>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        
        function log(message, type = 'info') {
            const color = type === 'error' ? 'text-red-600' : type === 'success' ? 'text-green-600' : 'text-blue-600';
            output.innerHTML += `<p class="${color}">${new Date().toLocaleTimeString()}: ${message}</p>`;
        }

        // Test 1: Toggle functionality
        document.getElementById('testToggle').addEventListener('click', () => {
            log('✓ Le bouton toggle fonctionne!', 'success');
        });

        // Test 2: API Call
        document.getElementById('testSubmit').addEventListener('click', async () => {
            const question = document.getElementById('testQuestion').value;
            if (!question) {
                log('⚠ Veuillez entrer une question', 'error');
                return;
            }

            log('Envoi de la requête à /api/tutor...');
            
            try {
                const response = await fetch('/api/tutor', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        question: question,
                        context: 'Test context',
                        mode: 'expliquer'
                    })
                });

                log(`Status HTTP: ${response.status}`);
                
                if (!response.ok) {
                    const errorText = await response.text();
                    log(`❌ Erreur HTTP ${response.status}: ${errorText}`, 'error');
                    return;
                }

                const data = await response.json();
                log(`✓ Réponse reçue: ${JSON.stringify(data)}`, 'success');
                
            } catch (error) {
                log(`❌ Erreur: ${error.message}`, 'error');
            }
        });

        log('Page de test chargée. Prêt pour les tests!');
    </script>
</body>
</html>
