vich_uploader:
    db_driver: orm

    mappings:
        event_images:
            uri_prefix: /uploads/events
            upload_destination: '%kernel.project_dir%/public/uploads/events'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        module_images:
            uri_prefix: /uploads/modules
            upload_destination: '%kernel.project_dir%/public/uploads/modules'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer

        module_documents:
            uri_prefix: /uploads/documents
            upload_destination: '%kernel.project_dir%/public/uploads/documents'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
